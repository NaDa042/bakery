<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="assets/styles.css" rel="stylesheet">
    <script src="assets/script.js" defer></script>
    <script src="assets/front.js" defer></script>
</head>
<body>
    <div class="shopping-cart">
    <header class="hero">
        <div class="blossoms">
            <span>🥐</span>
            <span>🌸</span>
            <span>🍪</span>
            <span>🌸</span>
            <span>🧁</span>
            <span>🌸</span>
        </div>
        <h1>Blossom Bakes</h1>
        <div class="bread">
            <span>🌸</span>
            <span>🍰</span>
            <span>🌸</span>
            <span>🍩</span>
            <span>🥐</span>
            <span>🌸</span>
        </div>
        <p class="tagline">Baked with love, every single day 🌸</p>
    </header>
        <nav>
            <ul>

                <li title="Cake"><a href="#cakes"><img src="./images/icons/cake.png" alt=""></a></li>
                <li title="Cookies"><a href="#cookies"><img src="./images/icons/cookies.png" alt=""></a></li>
                <li title="Cupcake"><a href="#cupcake"><img src="./images/icons/cupcake.png" alt=""></a></li>
                <li title="Croissant"><a href="#croissant"><img src="./images/icons/croissant.png" alt=""></a></li>
                <li title="Donut"><a href="#donut"><img src="./images/icons/donut.png" alt=""></a></li>
                <li title="rolls"><a href="#rolls"><img src="./images/icons/roll.png" alt=""></a></li>
                <li id="cartbtn">
                    <img class="still" src="./images/icons/cart.png">
                    <img class="animated" src="./images/icons/cartani.gif">
                </li>
            </ul>
        </nav>
        <div class="currency-selector"></div>
        <div class="cart-container">
            <div class="products-container">
                <h2>Cakes</h2>
                <div class="cakes" id="cakes"></div>
                <h2>Cookies</h2>
                <div class="cookies" id="cookies"></div>
                <h2>Croissant</h2>
                <div class="croissant" id="croissant"></div>
                <h2>Cupcake</h2>
                <div class="cupcake" id="cupcake"></div>
                <h2>Donut</h2>
                <div class="donut" id="donut"></div>
                <h2>Rolls</h2>
                <div class="rolls" id="rolls"></div>
            </div>
            <div class="cart-section">
                <button id="closeCart">✕</button>
                <h2 id="cart">Your Shopping Cart</h2>
                <div class="empty-btn"></div>
                <div class="cart"></div>
                <div class="checkout-container">
                    <h2>Checkout</h2>
                    <div class="checkout">
                        <div class="cart-total"></div>
                        <form>
                            <label>Enter Cash Received:</label>
                            <input class="received" type="text">
                            <button class="pay">Submit</button> 
                        </form>
                        <h3>Receipt</h3>
                        <div class="pay-summary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
